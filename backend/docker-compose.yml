services:
  api:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: ghcr.io/dark7sky/ta_watchdog_api:latest
    container_name: ta_watchdog_api
    restart: always
    # Portainer stack env vars (or local shell/.env at compose-parse time)
    ports:
      - "8921:8921"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-600}
      LOGIN_RATE_LIMIT_BLOCK_SECONDS: ${LOGIN_RATE_LIMIT_BLOCK_SECONDS:-900}
      KEY_OPENAI: ${KEY_OPENAI:-}
      ACCOUNT_IGNORE_TABLES: ${ACCOUNT_IGNORE_TABLES:-}
      ACCOUNT_TABLE_CACHE_TTL_SECONDS: ${ACCOUNT_TABLE_CACHE_TTL_SECONDS:-30}
    # Allow container to access host network to reach external PostgreSQL
    # If using Docker Desktop for Windows/Mac: host.docker.internal works out of the box
    # For Linux, this maps the host IP to host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - portainer_container_network
    volumes:
      # Optional: Mount the backend directory for local development (hot-reload)
      # - ./:/app
      - api_data:/app/data

volumes:
  api_data:

networks:
  portainer_container_network:
    external: true
