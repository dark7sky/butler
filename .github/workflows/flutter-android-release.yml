name: Build Android APK

on:
  push:
    branches: ["main"]
    paths:
      - "ta_watchdog/**"
      - ".github/workflows/flutter-android-release.yml"
  workflow_dispatch:

jobs:
  android-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
      FIREBASE_TESTERS: ${{ vars.FIREBASE_TESTERS }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dkotlin.compiler.execution.strategy=in-process

    defaults:
      run:
        working-directory: ta_watchdog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            mkdir -p android/app
            printf "%s" "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n" \
              "${ANDROID_KEYSTORE_PASSWORD}" "${ANDROID_KEY_PASSWORD}" "${ANDROID_KEY_ALIAS}" > android/key.properties

            keytool -list -keystore android/app/upload-keystore.jks -storepass "${ANDROID_KEYSTORE_PASSWORD}" -alias "${ANDROID_KEY_ALIAS}" >/dev/null
            echo "Release signing files prepared from GitHub secrets."
          else
            echo "Required Android signing secrets are missing."
            echo "Please set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD."
            exit 1
          fi

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_BASE_URL=${API_BASE_URL:-https://example.invalid} \
            --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release-${{ github.run_number }}
          path: ta_watchdog/build/app/outputs/flutter-apk/app-release.apk

      - name: Distribute APK to Firebase App Distribution (optional)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON}" ] && [ -n "${FIREBASE_APP_ID}" ] && [ -n "${FIREBASE_TESTERS}" ]; then
            printf "%s" "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "${RUNNER_TEMP}/firebase_service_account.json"
            export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase_service_account.json"

            npm install -g firebase-tools
            firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
              --app "${FIREBASE_APP_ID}" \
              --testers "${FIREBASE_TESTERS}" \
              --release-notes "GitHub Actions build #${GITHUB_RUN_NUMBER}"
          else
            echo "Firebase distribution vars/secrets not fully set. Skipping Firebase distribution."
          fi
