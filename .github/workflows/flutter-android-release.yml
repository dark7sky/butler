name: Build Android APK

on:
  push:
    branches: ["main"]
    paths:
      - "ta_watchdog/**"
      - ".github/workflows/flutter-android-release.yml"
  workflow_dispatch:

jobs:
  android-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ta_watchdog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare signing files (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n" \
              "${ANDROID_KEYSTORE_PASSWORD}" "${ANDROID_KEY_PASSWORD}" "${ANDROID_KEY_ALIAS}" > android/key.properties
            echo "Release signing files prepared."
          else
            echo "Signing secrets not fully set. Falling back to debug signing for this build."
          fi

      - name: Build release APK
        run: flutter build apk --release --build-number=${{ github.run_number }} --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release-${{ github.run_number }}
          path: ta_watchdog/build/app/outputs/flutter-apk/app-release.apk
